<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词闯关乐园 🎮</title>
<style>
  :root {
    /* 暖纸色调 · 收敛而和谐 */
    --paper:#f7f4ef; --paper-2:#f1ece4;
    --card:#fffdfa; --line:#ece5db;
    --ink:#2b2a2e; --muted:#9b948c;
    /* 主色:珊瑚 / 辅色:青绿 / 暖琥珀 / 雾紫 */
    --primary:#e8705a; --primary-d:#cf5a45; --primary-soft:#fbeae5;
    --teal:#3fa896; --teal-soft:#e3f3ef;
    --blue:#5b8def; --blue-soft:#e8eefc;
    --green:#5aa469; --green-soft:#e8f3ea;
    --amber:#e0a13c; --amber-soft:#f9efdb;
    --purple:#8c7bd0; --purple-soft:#eeeafb;
    --gray:#b3ada4;
    /* 柔和分层阴影 */
    --shadow:0 1px 2px rgba(43,42,46,.04), 0 6px 20px rgba(43,42,46,.07);
    --shadow-lg:0 2px 4px rgba(43,42,46,.05), 0 14px 38px rgba(43,42,46,.10);
    --radius:18px; --radius-lg:24px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; height:100%; }
  body {
    font-family:ui-rounded,"SF Pro Rounded","Nunito","Quicksand","Segoe UI",
                "PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:
      radial-gradient(1100px 600px at 50% -10%, #fff 0%, rgba(255,255,255,0) 60%),
      linear-gradient(180deg,var(--paper) 0%,var(--paper-2) 100%);
    background-attachment:fixed;
    color:var(--ink); min-height:100vh; overflow-x:hidden;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    letter-spacing:.1px;
  }
  #app { max-width:880px; margin:0 auto; padding:24px 18px 60px; }


  h1 { text-align:center; font-size:clamp(26px,5vw,38px); margin:14px 0 4px;
       color:var(--ink); font-weight:800; letter-spacing:-.4px; }
  .subtitle { text-align:center; color:var(--muted); margin:0 0 26px; font-size:15px; font-weight:600; }

  .card { background:var(--card); border-radius:var(--radius-lg); box-shadow:var(--shadow);
          border:1px solid var(--line); padding:24px; margin:16px 0; }

  /* 按钮:扁平 + 克制的轻浮起,hover 微抬,active 回落 */
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px;
         border:none; border-radius:14px; padding:12px 20px; font-size:16px; font-weight:700;
         cursor:pointer; color:#fff; background:var(--primary); font-family:inherit;
         box-shadow:0 2px 6px rgba(232,112,90,.30); letter-spacing:.2px;
         transition:transform .15s cubic-bezier(.2,.7,.3,1), box-shadow .15s, filter .15s; }
  .btn:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(232,112,90,.34); }
  .btn:active { transform:translateY(0); box-shadow:0 1px 3px rgba(232,112,90,.30); filter:brightness(.98); }
  .btn.blue{background:var(--blue);box-shadow:0 2px 6px rgba(91,141,239,.30);}
  .btn.blue:hover{box-shadow:0 6px 16px rgba(91,141,239,.34);}
  .btn.green{background:var(--green);box-shadow:0 2px 6px rgba(90,164,105,.30);}
  .btn.green:hover{box-shadow:0 6px 16px rgba(90,164,105,.34);}
  .btn.purple{background:var(--purple);box-shadow:0 2px 6px rgba(140,123,208,.30);}
  .btn.purple:hover{box-shadow:0 6px 16px rgba(140,123,208,.34);}
  .btn.orange{background:var(--amber);box-shadow:0 2px 6px rgba(224,161,60,.30);}
  .btn.orange:hover{box-shadow:0 6px 16px rgba(224,161,60,.34);}
  /* 次要按钮:幽灵风格,更显克制 */
  .btn.gray{background:#fff;color:var(--muted);border:1px solid var(--line);box-shadow:none;}
  .btn.gray:hover{color:var(--ink);border-color:#d9d1c6;transform:translateY(-2px);box-shadow:var(--shadow);}
  .btn.small{padding:8px 14px;font-size:14px;border-radius:11px;}
  .btn.big{font-size:20px;padding:16px 26px;}
  .btn-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(158px,1fr)); gap:14px; }
  /* 卡片:发丝边框 + 顶部细色条在 hover 时出现的高级感 */
  .tile { position:relative; background:var(--card); border-radius:var(--radius);
          box-shadow:var(--shadow); padding:22px 16px; text-align:center; cursor:pointer;
          border:1px solid var(--line); overflow:hidden;
          transition:transform .18s cubic-bezier(.2,.7,.3,1), box-shadow .18s, border-color .18s; }
  .tile::before { content:""; position:absolute; left:0; top:0; right:0; height:3px;
          background:linear-gradient(90deg,var(--primary),var(--amber)); transform:scaleX(0);
          transform-origin:left; transition:transform .25s ease; }
  .tile:hover{transform:translateY(-5px); box-shadow:var(--shadow-lg); border-color:#e4dccf;}
  .tile:hover::before{transform:scaleX(1);}
  .tile.sel{border-color:var(--primary);}
  .tile-total{background:linear-gradient(180deg,#fffdf8,#fdf6e8);border-color:#f0e2c4;}
  .tile-total::before{transform:scaleX(1);background:linear-gradient(90deg,var(--amber),var(--primary));}
  .tile .emoji{font-size:34px;display:block;margin-bottom:10px;}
  .tile .t-title{font-weight:800;font-size:16px;letter-spacing:-.2px;}
  .tile .t-sub{color:var(--muted);font-size:12.5px;margin-top:5px;font-weight:600;}
  .badge{display:inline-block;background:var(--amber-soft);color:#9a6b16;border-radius:999px;
         padding:3px 11px;font-size:12px;font-weight:800;margin-top:8px;border:1px solid #f0e2c4;}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
  .crumbs{color:var(--muted);font-size:13.5px;font-weight:700;letter-spacing:.2px;}

  /* gameplay */
  .progressbar{height:10px;background:var(--paper-2);border-radius:999px;overflow:hidden;
               margin:8px 0 16px;border:1px solid var(--line);}
  .progressbar > div{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));
               width:0;transition:width .4s cubic-bezier(.2,.7,.3,1);border-radius:999px;}
  .qmeta{display:flex;justify-content:space-between;font-size:13.5px;color:var(--muted);font-weight:700;margin-bottom:2px;}
  .prompt-cn{font-size:clamp(22px,5vw,30px);font-weight:800;text-align:center;margin:8px 0;letter-spacing:-.3px;}
  .prompt-ipa{text-align:center;color:var(--teal);font-size:17px;margin:2px 0;font-weight:600;font-style:italic;}
  .speakbtn{display:inline-flex;margin:10px auto 2px;background:var(--teal-soft);color:#2a7d6f;
            box-shadow:none;border:1px solid #c7e6df;}
  .speakbtn:hover{background:#d7ede8;box-shadow:var(--shadow);}

  .slots{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:22px 0;}
  .slot{width:46px;height:56px;border-radius:13px;background:#fff;display:flex;align-items:center;
        justify-content:center;font-size:26px;font-weight:800;border:1.5px solid var(--line);
        text-transform:lowercase;color:var(--ink);transition:all .15s;
        box-shadow:0 1px 2px rgba(43,42,46,.04);}
  .slot.fixed{background:var(--blue-soft);border-color:#cfdcfb;color:var(--blue);}
  .slot.filled{background:#fff;border-color:var(--green);color:var(--ink);}
  .slot.cursor{border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft);}
  .slot.space{background:transparent;border:none;width:16px;box-shadow:none;}

  .sentence{font-size:clamp(20px,4.5vw,27px);font-weight:700;text-align:center;line-height:1.85;margin:16px 0;}
  .sentence .blank{display:inline-block;min-width:96px;border-bottom:3px solid var(--primary);
                   color:var(--primary);padding:0 8px;font-weight:800;}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin:20px 0;}
  .option{background:#fff;border:1.5px solid var(--line);border-radius:15px;padding:16px;font-size:19px;
          font-weight:700;cursor:pointer;text-align:center;display:flex;
          align-items:center;gap:11px;justify-content:flex-start;box-shadow:0 1px 2px rgba(43,42,46,.04);
          transition:transform .15s cubic-bezier(.2,.7,.3,1), box-shadow .15s, border-color .15s;}
  .option:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:#ddd4c8;}
  .option .num{background:var(--paper-2);color:var(--muted);border-radius:9px;width:30px;height:30px;
               display:inline-flex;align-items:center;justify-content:center;font-size:15px;flex:none;
               font-weight:800;transition:all .15s;}
  .option:hover .num{background:var(--blue-soft);color:var(--blue);}
  .option.right{border-color:var(--green);background:var(--green-soft);}
  .option.right .num{background:var(--green);color:#fff;}
  .option.wrong{border-color:var(--primary);background:var(--primary-soft);}
  .option.wrong .num{background:var(--primary);color:#fff;}

  .feedback{text-align:center;font-size:20px;font-weight:800;min-height:28px;margin:10px 0;letter-spacing:-.2px;}
  .feedback.ok{color:var(--green);} .feedback.no{color:var(--primary);}
  .feedback.show-answer{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .feedback.show-answer .ans-head{font-size:17px;}
  .feedback.show-answer .ans-word{font-size:32px;font-weight:800;letter-spacing:1px;color:var(--teal);line-height:1.2;}
  .feedback.show-answer .ans-word .ans-ipa{font-size:18px;font-style:italic;font-weight:600;margin-left:8px;color:var(--muted);}
  .feedback.show-answer .ans-mean{font-size:18px;color:var(--ink);opacity:.85;}
  .feedback.hint-sub{color:var(--blue);font-size:17px;}
  .key.submit-key{background:var(--green);color:#fff;}
  .prep-q{font-size:clamp(24px,5vw,34px);font-weight:800;text-align:center;margin:14px 0;letter-spacing:.5px;}
  .prep-example{font-size:clamp(17px,3.5vw,21px);text-align:center;color:var(--muted);margin:6px 0 18px;}
  .prep-blank{display:inline-block;min-width:42px;color:var(--primary);border-bottom:3px solid var(--primary);margin:0 3px;text-align:center;}
  .prep-blank.filled{color:var(--green);border-color:var(--green);}

  /* virtual keyboard */
  .keyboard{margin:22px auto 0;max-width:680px;padding:14px;background:var(--paper-2);
            border-radius:18px;border:1px solid var(--line);}
  .krow{display:flex;justify-content:center;gap:6px;margin-bottom:6px;}
  .krow:last-child{margin-bottom:0;}
  .key{flex:1;max-width:52px;height:48px;border-radius:11px;background:#fff;
       box-shadow:0 1.5px 0 #e0d8cc, 0 2px 4px rgba(43,42,46,.05);
       display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--ink);
       text-transform:uppercase;user-select:none;cursor:pointer;transition:all .12s;}
  .key:hover{transform:translateY(-1px);}
  .key.wide{max-width:116px;flex:2;font-size:14px;color:var(--muted);}
  .key.hl{background:var(--amber);color:#fff;box-shadow:0 1.5px 0 #c5871f, 0 0 0 4px var(--amber-soft);transform:translateY(-1px) scale(1.04);}
  .key.good{background:var(--green);color:#fff;box-shadow:0 1.5px 0 #498a56;}
  .key.bad{background:var(--primary);color:#fff;box-shadow:0 1.5px 0 var(--primary-d);animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

  .result-emoji{font-size:74px;text-align:center;line-height:1;margin-bottom:6px;}
  .stars{font-size:42px;text-align:center;letter-spacing:8px;margin:4px 0 10px;}
  .stat-line{font-size:18px;text-align:center;font-weight:700;margin:7px 0;color:var(--ink);}

  .hint{color:var(--muted);font-size:13.5px;text-align:center;margin-top:12px;line-height:1.6;font-weight:500;}
  .hidden-input{position:absolute;opacity:0;height:0;width:0;}
  select,input[type=text]{font-family:inherit;font-size:15px;padding:10px 12px;border-radius:12px;
          border:1.5px solid var(--line);background:#fff;color:var(--ink);font-weight:600;cursor:pointer;}
  select:focus,input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);}
  label{font-weight:700;color:var(--ink);margin-right:6px;}
  .filebtn{position:relative;overflow:hidden;}
  .filebtn input{position:absolute;left:0;top:0;opacity:0;width:100%;height:100%;cursor:pointer;}
  .toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(10px);
         background:var(--ink);color:#fff;padding:12px 22px;border-radius:13px;font-weight:700;font-size:14.5px;
         opacity:0;transition:opacity .3s, transform .3s;z-index:50;box-shadow:var(--shadow-lg);pointer-events:none;}
  .toast.show{opacity:.96;transform:translateX(-50%) translateY(0);}
  .empty{text-align:center;color:var(--muted);padding:34px;font-weight:600;}
  .section-label{font-weight:800;font-size:15px;letter-spacing:-.2px;display:flex;align-items:center;gap:7px;}

  /* 模态层(PDF 解析确认) */
  .modal-mask{position:fixed;inset:0;background:rgba(43,42,46,.42);backdrop-filter:blur(3px);
              display:none;align-items:center;justify-content:center;z-index:60;padding:18px;}
  .modal-mask.show{display:flex;animation:rise .3s cubic-bezier(.2,.7,.3,1);}
  .modal{background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
         border:1px solid var(--line);padding:24px;max-width:560px;width:100%;max-height:88vh;overflow:auto;}
  .modal h3{font-size:20px;letter-spacing:-.3px;}
  .field{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .field label{flex:none;width:74px;}
  .field input,.field select{flex:1;}
  #pdfText{width:100%;min-height:200px;font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:13.5px;
           line-height:1.7;padding:12px;border-radius:12px;border:1.5px solid var(--line);
           background:var(--paper);color:var(--ink);resize:vertical;}
  #pdfText:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);}
  /* 欢迎页 — 选身份 */
  #screen-welcome.active{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .welcome-wrap{text-align:center;padding:40px 20px;max-width:500px;}
  .welcome-wrap h1{font-size:32px;margin:0 0 8px;}
  .welcome-sub{font-size:17px;color:var(--muted);margin:0 0 36px;}
  .identity-cards{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;}
  .id-card{cursor:pointer;border-radius:18px;padding:22px 28px;background:var(--paper);box-shadow:0 2px 16px rgba(0,0,0,.07);transition:transform .2s,box-shadow .2s;user-select:none;}
  .id-card:hover{transform:translateY(-5px);box-shadow:0 10px 28px rgba(0,0,0,.13);}
  .id-card:active{transform:scale(.97);}
  .id-photo{width:150px;height:150px;border-radius:14px;object-fit:cover;display:block;margin:0 auto;}
  .id-name{font-size:24px;font-weight:800;margin:14px 0 4px;}
  .id-grade{font-size:15px;color:var(--muted);}
  .ice-badge{display:inline-block;font-size:18px;margin-top:4px;min-height:24px;}
  /* 屏幕切换动画 */
  .screen{display:none;}
  .screen.active{display:block;animation:fadeSlideIn .35s cubic-bezier(.4,0,.2,1) both;}
  @keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  /* 照片弹出特效 */
  .id-card.popping{animation:popBurst .42s ease both;pointer-events:none;}
  @keyframes popBurst{0%{transform:scale(1);}30%{transform:scale(1.18);}100%{transform:scale(.88);opacity:.3;}}
  /* 游戏界面玩家照片 */
  .game-photo{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--line);flex-shrink:0;}
  /* 冰淇淋 toast */
  #toast.icecream{background:var(--amber-soft);color:#9a6b16;font-size:17px;padding:14px 22px;max-width:340px;text-align:center;line-height:1.6;}
</style>
</head>

    <div class="welcome-wrap">

let store = loadStore();

function loadStore(){
  // 兜底默认值:每个字段都先有,避免旧版本写入的 store 缺字段时后续代码崩溃
  const def = { banks:{}, progress:{}, wrong:{}, timing:{}, hintOn:false, correctTotal:{}, iceCream:{} };
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const s = JSON.parse(raw);
      // 字段补全(migration):旧版 store 可能缺 correctTotal/iceCream 等,
      // banks 若为 null 也修回对象,否则 EMBEDDED_BANKS 注入会抛 "Cannot set properties of null"
      return {
        banks: (s.banks && typeof s.banks==="object") ? s.banks : def.banks,
        progress: s.progress || def.progress,
        wrong: s.wrong || def.wrong,
        timing: s.timing || def.timing,
        hintOn: typeof s.hintOn==="boolean" ? s.hintOn : def.hintOn,
        correctTotal: (s.correctTotal && typeof s.correctTotal==="object") ? s.correctTotal : def.correctTotal,
        iceCream: (s.iceCream && typeof s.iceCream==="object") ? s.iceCream : def.iceCream,
        identity: (typeof s.identity==="string") ? s.identity : null,
        photo: (typeof s.photo==="string") ? s.photo : null,
      };
    }
  } catch(e){}
  return def;
}

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ---------- 发音(Web Speech API) ---------- */
// 不指定 voice 时浏览器按 lang 自动选默认 voice,Windows 上常退化成旧 SAPI5 机器音(生硬)。
// 这里主动挑最自然的可用英文 voice:神经网络自然音 > 本地高质量 > 其他英文 > 兜底默认。
const NATURAL_HINTS=["natural","aria","jenny","guy","emma","sara","samantha","ava","serena","google us"];
const GOOD_HINTS=["zira","susan","heather","fiona","karen","moira"];
function bestEnglishVoice(){
  const vs=speechSynthesis.getVoices();
  if(!vs || !vs.length) return null;
  const en=vs.filter(v=>v.lang && v.lang.toLowerCase().indexOf("en")===0);
  if(!en.length) return null;
  // 优先级 1:名称含 natural/neural 等的神经网络自然音
  let pick=en.find(v=>NATURAL_HINTS.some(h=>v.name.toLowerCase().indexOf(h)>=0));
  // 优先级 2:已知较自然的高质量本地音(macOS/旧版较好者)
  if(!pick) pick=en.find(v=>GOOD_HINTS.some(h=>v.name.toLowerCase().indexOf(h)>=0));
  // 优先级 3:默认英文 voice
  if(!pick) pick=en.find(v=>v.default) || en[0];
  return pick;
}
// 预热:voice 列表异步加载,页面加载时先触发一次,并在加载完成时缓存
if(window.speechSynthesis){
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
}
function speak(text){
  if(!text || !window.speechSynthesis) return;
  try {
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="en-US"; u.rate=0.85;
    const v=bestEnglishVoice();
    if(v) u.voice=v;
    speechSynthesis.speak(u);
  } catch(e){}
}

/* ---------- 作用域工具:跨子库取条目 / 取错题 ---------- */
// 返回作用域内全部条目,每条带 _bid(来源子库)与 _grade
function scopeItems(){
  const out=[];
  scope.bankIds.forEach(bid=>{
    const b=store.banks[bid]; if(!b) return;
    const g=b.meta.grade||4;
    b.items.forEach(it=> out.push(Object.assign({}, it, {_bid:bid, _grade:g})));
  });
  return out;
}
// 返回作用域内全部错题条目(已映射回 item,带 _bid/_grade)
function scopeWrongItems(){
  const out=[];
  scope.bankIds.forEach(bid=>{
    const b=store.banks[bid]; if(!b) return;
    const keys=(store.wrong[bid]||[]).map(w=>w.key);
    const g=b.meta.grade||4;
    b.items.forEach(it=>{ if(keys.includes(itemKey(bid,it))) out.push(Object.assign({}, it, {_bid:bid, _grade:g})); });
  });
  return out;
}
// 作用域内错题原始记录(扁平)
function scopeWrong(){
  const out=[];
  scope.bankIds.forEach(bid=>{ (store.wrong[bid]||[]).forEach(w=>out.push(w)); });
  return out;
}
// 作用域进度存储 id(子库用自身 id;总库用合成 id)
function scopeProgressId(){ return scope.kind==="total" ? ("__total__::"+scope.child) : scope.bankIds[0]; }

/* =========================================================
   出题:根据模式与年级筛选条目(作用域内,跨子库)
   ========================================================= */
function eligibleItems(mode){
  const items=scopeItems();
  if(mode==="spell1"||mode==="spell2"){
    return items.filter(it=> it.type==="word" || (mode==="spell1"&&it.type==="phrase"&&!it.word.includes(" ")));
  }
  if(mode==="mean1"||mode==="mean2"){
    return items.filter(it=> (it.type==="word"||it.type==="phrase") && it.meaning);
  }
  if(mode==="cloze"){
    return items.filter(it=> (it.example && it.example.split(" ").length>=2) );
  }
  return items;
}

/* =========================================================
   游戏主循环
   ========================================================= */
let game=null; // {mode, queue:[], idx, correct, startTs, qStartTs, fromWrong}

function startGame(mode, fromWrong){
  const raw=$("qcount").value;
  const wantAll=(raw==="0"); // 0 = 全部单词(考前查缺补漏,每个词各一次)
  let pool;
  if(fromWrong){
    pool=scopeWrongItems().filter(it=>isItemUsable(mode,it));
    if(pool.length===0){ toast("错题本里没有适合这个模式的题 🙂"); return; }
  } else {
    pool=eligibleItems(mode);
    if(pool.length===0){ toast("这个词库没有适合该模式的内容 🙂"); return; }
  }
  // 题数:"全部"取满池(每词各一次,不重复);否则按所选数(不足允许重复)
  let n;
  if(wantAll) n=pool.length;
  else n=Math.min(parseInt(raw,10), Math.max(pool.length, 3));
  // 题目数量不足时允许重复
  let queue=shuffle(pool);
  while(queue.length<n) queue=queue.concat(shuffle(pool));
  queue=queue.slice(0,n);

  game={ mode, queue, idx:0, correct:0, fromWrong,
         startTs:Date.now(), qStartTs:0, attempted:false };
  // 右上角显示当前玩家照片
  const gp=$("gamePhoto");
  if(gp && store.photo){ gp.src=store.photo; gp.style.display=""; }
  else if(gp) gp.style.display="none";
  $("gameCrumbs").textContent=(fromWrong?"📒 错题练习 · ":"")+(scope.kind==="total"?"总库 · ":"")+modeTitle(mode);
  show("game");
  nextQuestion();
}
function modeTitle(m){ return (MODES.find(x=>x.id===m)||{}).title||m; }

function nextQuestion(){
  if(game.idx>=game.queue.length){ finishGame(); return; }
  const total=game.queue.length;
  $("qProgress").textContent=`第 ${game.idx+1} / ${total} 题`;
  $("qScore").textContent="⭐ "+game.correct;
  $("qbar").style.width=(game.idx/total*100)+"%";
  $("feedback").textContent=""; $("feedback").className="feedback";
  game.attempted=false;
  game.qStartTs=Date.now();
  const it=game.queue[game.idx];
  const render={spell1:renderSpell1,spell2:renderSpell2,mean1:renderMean1,mean2:renderMean2,cloze:renderCloze,prep:renderPrep}[game.mode];
  render(it);
}

/* 判定一道题结束:记录正误、超时、错题本、统计 */
function judge(it, isRight){
  if(game.attempted) return; // 防重复
  game.attempted=true;
  const elapsed=(Date.now()-game.qStartTs)/1000;
  const bid=it._bid;                       // 错题归属其来源子库
  const key=itemKey(bid, it);

  let slow=false;
  if(isRight){
    slow=recordTimingAndCheckSlow(game.mode, elapsed); // 仅答对才计入耗时统计
  }

  if(isRight && !slow){
    game.correct++;
    // 冰淇淋彩蛋:累计答对(跨会话,按身份)
    const id = store.identity;
    if(id){
      store.correctTotal[id] = (store.correctTotal[id] || 0) + 1;
      const ct = store.correctTotal[id];
      const ic = store.iceCream[id] || 0;
      if(ct % 50 === 0 && ic < Math.floor(ct / 50) && ic < 5){
        store.iceCream[id] = Math.min(Math.floor(ct / 50), 5);
        updateIceCreamDisplay();
        setTimeout(()=>showIceCreamToast(id), 300);
      }
    }
    // 错题本中:连续答对 +1,够 3 次毕业
    if(game.fromWrong) bumpWrongStreak(bid, key, true);
    else if(isInWrong(bid, key)) bumpWrongStreak(bid, key, true);
    flash(true, slow, it);
  } else {
    // 答错,或答对但太慢 -> 进错题本
    addToWrong(bid, key);
    if(game.fromWrong) bumpWrongStreak(bid, key, false); // 错题练习里做错,连击清零
    flash(false, slow && isRight, it);
  }
  saveStore();
}

function flash(ok, slowButRight, it){
  const fb=$("feedback");
  if(ok){
    fb.innerHTML=pick(["太棒了! 🎉","真厉害! ⭐","答对啦! 👍","完美! 💯"]);
    fb.className="feedback ok";
    setTimeout(()=>{ game.idx++; nextQuestion(); }, 900);
  } else {
    // 答错或超时答对:显示正确答案,停留 3 秒方便孩子记忆
    const head = slowButRight ? "对了,但有点慢——记住它 ⏱️" : "没关系,正确答案是 💪";
    const ipa = it.ipa ? ` <span class="ans-ipa">${it.ipa}</span>` : "";
    fb.innerHTML=`<div class="ans-head">${head}</div><div class="ans-word">${it.word}${ipa}</div>${it.meaning?`<div class="ans-mean">${it.meaning}</div>`:""}`;
    fb.className="feedback no show-answer";
    setTimeout(()=>{ game.idx++; nextQuestion(); }, 3000);
  }
}

/* ---------- 耗时统计(Welford 在线均值/方差,按题型) ---------- */
function recordTimingAndCheckSlow(mode, x){
  const t=store.timing[mode] || {n:0,mean:0,m2:0};
  let slow=false;
  if(t.n>=10){
    const sd=Math.sqrt(t.m2/(t.n-1));
    if(x > t.mean + sd) slow=true; // 超过 μ+1σ
  }
  // 更新统计
  t.n++; const d=x-t.mean; t.mean+=d/t.n; const d2=x-t.mean; t.m2+=d*d2;
  store.timing[mode]=t;
  return slow;
}

/* ---------- 错题本(按子库 bid 存储) ---------- */
function getWrong(bid){ return store.wrong[bid]=store.wrong[bid]||[]; }
function isInWrong(bid, key){ return getWrong(bid).some(w=>w.key===key); }
function addToWrong(bid, key){
  const w=getWrong(bid);
  if(!w.some(x=>x.key===key)) w.push({key, streak:0});
}
function bumpWrongStreak(bid, key, correct){
  const w=getWrong(bid); const e=w.find(x=>x.key===key); if(!e) return;
  if(correct){ e.streak=(e.streak||0)+1; if(e.streak>=3){ store.wrong[bid]=w.filter(x=>x.key!==key); } }
  else { e.streak=0; }
}

/* =========================================================
   模式 ①  拼写闯关 1 — 补全缺字母
   ========================================================= */
let spell=null; // {answer, slots:[{ch,fixed,filled}], cursor}

function renderSpell1(it){
  const word=it.word.toLowerCase();
  const grade=it._grade||4;
  const letters=word.split("");
  const idxLetters=letters.map((c,i)=>({c,i})).filter(o=>/[a-z]/.test(o.c));
  // 隐藏比例:一年级约 1/3 且偏后,四年级过半随机
  let hideCount, hideSet=new Set();
  if(grade<=2){
    hideCount=Math.max(1, Math.round(idxLetters.length/3));
    const tail=idxLetters.slice(Math.ceil(idxLetters.length/2)); // 后半段
    shuffle(tail).slice(0,hideCount).forEach(o=>hideSet.add(o.i));
  } else {
    hideCount=Math.max(2, Math.ceil(idxLetters.length*0.6));
    shuffle(idxLetters).slice(0,hideCount).forEach(o=>hideSet.add(o.i));
  }
  const slots=letters.map((c,i)=>{
    if(c===" ") return {ch:" ", space:true};
    if(hideSet.has(i)) return {ch:c, fixed:false, filled:false, val:""};
    return {ch:c, fixed:true};
  });
  spell={answer:word, slots, cursor:firstBlank(slots)};
  drawSpell(it, true);
}

/* 模式 ② 拼写闯关 2 — 全词默写(全部空格) */
function renderSpell2(it){
  const word=it.word.toLowerCase();
  const grade=it._grade||4;
  const slots=word.split("").map(c=> c===" "?{ch:" ",space:true}:{ch:c,fixed:false,filled:false,val:""});
  spell={answer:word, slots, cursor:firstBlank(slots), allowFirstHint:grade<=2};
  drawSpell(it, false, spell.allowFirstHint);
}

function firstBlank(slots){ return slots.findIndex(s=>!s.fixed && !s.space); }

function drawSpell(it, isSpell1, allowHint){
  const card=$("gameCard");
  card.innerHTML=`
    <div class="prompt-cn">${it.meaning}</div>
    <button class="btn small speakbtn" id="spk">🔊 听发音</button>
    <div class="slots" id="slots"></div>
    ${it.type==="phrase"?'<p class="hint">这是个词组,注意空格</p>':''}
    ${allowHint?'<div class="btn-row"><button class="btn gray small" id="hintBtn">💡 提示首字母</button></div>':''}
  `;
  $("spk").onclick=()=>speak(it.word);
  if(allowHint) $("hintBtn").onclick=()=>{
    const fi=spell.slots.findIndex(s=>!s.fixed&&!s.space&&!s.val);
    if(fi>=0){ spell.slots[fi].val=spell.answer[fi]; spell.slots[fi].filled=true; advanceCursor(); drawSlots(); checkSpellDone(it); }
  };
  drawSlots();
  buildKeyboard(true);
  focusHidden();
  speak(it.word);
}

function drawSlots(){
  const wrap=$("slots"); wrap.innerHTML="";
  spell.slots.forEach((s,i)=>{
    const d=document.createElement("div");
    if(s.space){ d.className="slot space"; wrap.appendChild(d); return; }
    d.className="slot"+(s.fixed?" fixed":"")+(s.filled?" filled":"")+(i===spell.cursor?" cursor":"");
    d.textContent = s.fixed? s.ch : (s.val||"");
    wrap.appendChild(d);
  });
  // 高亮下一个该敲的键
  const cur=spell.slots[spell.cursor];
  highlightKey(cur?cur.ch:null);
}

function advanceCursor(){
  let i=spell.cursor+1;
  while(i<spell.slots.length && (spell.slots[i].fixed||spell.slots[i].space)) i++;
  spell.cursor = (i<spell.slots.length)? i : -1;
}

function handleLetter(ch){
  if(!spell || !game || game.attempted) return;
  if(spell.cursor<0) return;
  const cur=spell.slots[spell.cursor];
  if(!cur || cur.fixed || cur.space) return;
  const good = ch.toLowerCase()===cur.ch.toLowerCase();
  keyFeedback(ch, good);
  cur.val=ch.toLowerCase(); cur.filled=true;
  advanceCursor();
  drawSlots();
  if(game.mode==="cloze") syncBlank();
  checkSpellDone(game.queue[game.idx]);
}
function handleBackspace(){
  if(!spell || game.attempted) return;
  // 回退到上一个可填格
  let i = spell.cursor<0? spell.slots.length-1 : spell.cursor-1;
  while(i>=0 && (spell.slots[i].fixed||spell.slots[i].space)) i--;
  if(i>=0){ spell.slots[i].val=""; spell.slots[i].filled=false; spell.cursor=i; drawSlots(); if(game.mode==="cloze") syncBlank(); }
}
function checkSpellDone(it){
  // 填满后不自动提交:只标记状态 + 视觉提示,等回车(submitSpell)才判对错
  const allFilled=spell.slots.every(s=>s.fixed||s.space||s.val);
  if(allFilled){
    spell.cursor=-1; // 填满后光标收起
    drawSlots();
    const fb=$("feedback");
    if(fb && !game.attempted){ fb.innerHTML='填满啦!按 <b>回车 ⏎</b> 提交'; fb.className="feedback hint-sub"; }
    highlightKey(null);
  }
}
function submitSpell(it){
  if(!spell || !game || game.attempted) return;
  const allFilled=spell.slots.every(s=>s.fixed||s.space||s.val);
  if(!allFilled){
    const remain=spell.slots.filter(s=>!s.fixed&&!s.space&&!s.val).length;
    const fb=$("feedback");
    if(fb){ fb.innerHTML='还有 <b>'+remain+'</b> 个字母没填,继续!'; fb.className="feedback hint-sub"; }
    return;
  }
  const typed=spell.slots.map(s=> s.space?" ":(s.fixed?s.ch:s.val)).join("");
  judge(it, typed===spell.answer);
}

/* =========================================================
   模式 ③ 看词选意思 / ④ 看意思选词
   ========================================================= */
function buildOptions(it, key){
  // key = "meaning" 或 "word";干扰项取自整个作用域
  const pool=scopeItems().filter(x=>x[key] && x[key]!==it[key] && (x.type==="word"||x.type==="phrase"));
  const distract=shuffle(pool).slice(0,3).map(x=>x[key]);
  const opts=shuffle([it[key], ...distract]);
  // 不足 4 个也可
  return opts;
}
function renderMean1(it){ // 看英文,选中文
  const opts=buildOptions(it,"meaning");
  drawChoice(it, it.word, it.ipa, opts, it.meaning, true);
}
function renderMean2(it){ // 看中文,选英文
  const opts=buildOptions(it,"word");
  drawChoice(it, it.meaning, "", opts, it.word, false);
}
function drawChoice(it, promptText, ipa, opts, answer, speakIt){
  const card=$("gameCard");
  card.innerHTML=`
    <div class="prompt-cn">${promptText}</div>
    ${ipa?`<div class="prompt-ipa">${ipa}</div>`:""}
    ${speakIt?'<button class="btn small speakbtn" id="spk">🔊 听发音</button>':''}
    <div class="options" id="opts"></div>
    <p class="hint">用键盘按 1 / 2 / 3 / 4 选择</p>`;
  if(speakIt){ $("spk").onclick=()=>speak(it.word); speak(it.word); }
  const wrap=$("opts");
  opts.forEach((o,i)=>{
    const d=document.createElement("div"); d.className="option"; d.dataset.val=o;
    d.innerHTML=`<span class="num">${i+1}</span><span>${o}</span>`;
    d.onclick=()=>chooseOption(it, d, o===answer, answer);
    wrap.appendChild(d);
  });
  buildKeyboard(false);
  game._opts={answer, nodes:[...wrap.children]};
}
function chooseOption(it, node, isRight, answer){
  if(game.attempted) return;
  node.classList.add(isRight?"right":"wrong");
  if(!isRight){ // 标出正确答案
    game._opts.nodes.forEach(n=>{ if(n.dataset.val===answer) n.classList.add("right"); });
  }
  judge(it, isRight);
}

/* =========================================================
   模式 ⑤ 完形填空 — 句中敲词
   ========================================================= */
function renderCloze(it){
  // 用例句;挖掉目标词(it.word 的核心)
  const sentence=it.example;
  const target=it.word.toLowerCase();
  // 找到句中目标词的位置(忽略大小写,整词)
  const re=new RegExp("\\b"+escapeReg(target)+"\\b","i");
  let display=sentence, found=re.test(sentence);
  let answer=target;
  if(!found){
    // 例句里没有原词时,退化为默写该词(挖整词)
    display=sentence; answer=target;
  }
  spell={answer, slots:answer.split("").map(c=> c===" "?{ch:" ",space:true}:{ch:c,fixed:false,filled:false,val:""}),
         cursor:0};
  spell.cursor=firstBlank(spell.slots);

  const card=$("gameCard");
  const blanked = found? sentence.replace(re,'<span class="blank" id="blankSpot">____</span>')
                       : sentence+' <span class="blank" id="blankSpot">____</span>';
  card.innerHTML=`
    <div class="sentence">${blanked}</div>
    ${it.exampleMeaning?`<div class="prompt-cn" style="font-size:18px;color:var(--muted)">${it.exampleMeaning}</div>`:""}
    <div class="prompt-ipa">提示:${it.meaning}</div>
    <button class="btn small speakbtn" id="spk">🔊 听整句</button>
    <div class="slots" id="slots"></div>`;
  $("spk").onclick=()=>speak(sentence);
  drawClozeSlots();
  buildKeyboard(true);
  focusHidden();
  speak(sentence);
}
function escapeReg(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function drawClozeSlots(){
  drawSlots();
  // 同步更新句中空格显示
  const spot=$("blankSpot");
  if(spot){ const typed=spell.slots.map(s=>s.space?" ":(s.val||"_")).join(""); spot.textContent=typed; }
}
// 复用 handleLetter / checkSpellDone:cloze 下输入会同步更新句中空格(见 handleLetter)

/* =========================================================
   模式 ⑥ 介词专项 — 看含义选介词填空
   ========================================================= */
// 全局高频介词池(干扰项兜底)
const PREP_POOL=["in","on","at","for","of","to","with","about","after","from"];
function renderPrep(it){
  const card=$("gameCard");
  // 搭配空格: word 中把 prep 整词替换成空格 span
  const colHTML = it.word.replace(
    new RegExp("\\b"+escapeReg(it.prep)+"\\b","i"),
    '<span class="prep-blank">___</span>'
  );
  // 例句空格: example 中 prep 整词(首个)替换成等长下划线空格
  let exHTML = it.example || "";
  if(exHTML){
    exHTML = exHTML.replace(
      new RegExp("\\b"+escapeReg(it.prep)+"\\b","i"),
      m=>'<span class="prep-blank">'+m.replace(/./g,"_")+'</span>'
    );
  }
  card.innerHTML=`
    <div class="prompt-cn">${it.meaning}</div>
    <div class="prep-q">${colHTML}</div>
    ${exHTML?`<div class="prep-example">${exHTML}</div>`:""}
    <div class="options" id="opts"></div>
    <p class="hint">用键盘按 1 / 2 / 3 / 4 选择</p>`;
  // 注:介词模块不设发音按钮/不自动朗读——介词读音会暴露答案中的介词
  const opts=buildPrepOptions(it);
  const wrap=$("opts");
  opts.forEach((o,i)=>{
    const d=document.createElement("div"); d.className="option"; d.dataset.val=o;
    d.innerHTML=`<span class="num">${i+1}</span><span>${o}</span>`;
    d.onclick=()=>choosePrep(it, d, o===it.prep);
    wrap.appendChild(d);
  });
  buildKeyboard(false);
  game._opts={answer:it.prep, nodes:[...wrap.children]};
}
function buildPrepOptions(it){
  const correct=it.prep;
  let distract=[...(it.confusables||[])].filter(p=>p!==correct);
  // 不足3个: 从同 category 其他条目的 prep 补
  if(distract.length<3){
    const sameCat=scopeItems()
      .filter(x=>x.type==="prep"&&x.category===it.category&&x.prep!==correct)
      .map(x=>x.prep);
    for(const p of shuffle(sameCat)){ if(distract.length>=3) break; if(!distract.includes(p)&&p!==correct) distract.push(p); }
  }
  // 还不足: 全局池补
  if(distract.length<3){
    for(const p of PREP_POOL){ if(distract.length>=3) break; if(!distract.includes(p)&&p!==correct) distract.push(p); }
  }
  distract=distract.slice(0,3);
  return shuffle([correct, ...distract]);
}
// 介词选择判定: 复用 judge, 答错标出正确介词, 答完填入空格
function choosePrep(it, node, isRight){
  if(game.attempted) return;
  node.classList.add(isRight?"right":"wrong");
  if(!isRight){
    game._opts.nodes.forEach(n=>{ if(n.dataset.val===it.prep) n.classList.add("right"); });
  }
  fillPrepBlanks(it.prep); // 答完把正确介词填入空格(视觉反馈)
  judge(it, isRight);
}
// 选中介词后填入所有空格(搭配+例句联动)
function fillPrepBlanks(prep){
  document.querySelectorAll(".prep-blank").forEach(el=>{
    el.textContent=prep; el.classList.add("filled");
  });
}

/* =========================================================
   键盘事件(物理键盘)
   ========================================================= */
function focusHidden(){ const h=$("hiddenInput"); if(h){ h.value=""; setTimeout(()=>h.focus(),50); } }

document.addEventListener("keydown",(e)=>{
  if(!$("screen-game").classList.contains("active")) return;
  if(!game || game.attempted) return;
  const k=e.key;
  // 选择题:数字键
  if((game.mode==="mean1"||game.mode==="mean2") && /^[1-4]$/.test(k)){
    const idx=parseInt(k,10)-1; const nodes=game._opts?game._opts.nodes:[];
    if(nodes[idx]){ e.preventDefault(); nodes[idx].click(); }
    return;
  }
  // 拼写/完形:字母与退格
  if(game.mode==="spell1"||game.mode==="spell2"||game.mode==="cloze"){
    if(/^[a-zA-Z]$/.test(k)){ e.preventDefault(); handleLetter(k); }
    else if(k==="Backspace"){ e.preventDefault(); handleBackspace(); }
    else if(k==="Enter"){ e.preventDefault(); submitSpell(game.queue[game.idx]); }
  }
});
function syncBlank(){ const spot=$("blankSpot"); if(spot&&spell){ const typed=spell.slots.map(s=>s.space?" ":(s.val||"_")).join(""); spot.textContent=typed; } }

/* =========================================================
   结算
   ========================================================= */
function finishGame(){
  const total=game.queue.length;
  const correct=game.correct;
  const secs=Math.round((Date.now()-game.startTs)/1000);
  const ratio=correct/total;
  let stars = ratio>=1?3 : ratio>=0.7?2 : ratio>=0.4?1 : 0;
  // 记录最佳星数(按作用域)
  if(!game.fromWrong){
    const pid=scopeProgressId();
    const p=store.progress[pid]||{stars:0};
    p.stars=Math.max(p.stars||0, stars); store.progress[pid]=p; saveStore();
  }
  $("resultEmoji").textContent = stars===3?"🏆": stars>=1?"🎉":"💪";
  $("resultStars").textContent = "⭐".repeat(stars)+"☆".repeat(3-stars);
  $("resultScore").textContent = `答对 ${correct} / ${total} 题`;
  $("resultTime").textContent = `用时 ${secs} 秒`;
  const wrongNow=scopeWrong().length;
  $("resultWrong").textContent = `📒 ${scope.kind==="total"?"总库":"本子库"}错题本现有 ${wrongNow} 题`;
  $("againBtn").onclick=()=>startGame(game.mode, game.fromWrong);
  show("result");
}

/* =========================================================
   备份导入导出 / 词库管理
   ========================================================= */
function exportBackup(){
  const blob=new Blob([JSON.stringify(store,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="单词闯关备份.json";
  a.click();
  toast("已导出备份 📤");
}
function importBackup(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(data.banks){ store=data; saveStore(); renderBanks(); toast("备份已导入 ✅"); }
      else toast("这不是备份文件 😕");
    }catch(e){ toast("文件读取失败 😕"); }
  };
  r.readAsText(file);
}
function manageBanks(){
  const ids=Object.keys(store.banks);
  if(ids.length===0){ toast("还没有词库"); return; }
  const name=prompt("输入要删除的词库完整名称(留空取消)。\n现有词库:\n"+ids.join("\n"));
  if(name && store.banks[name]){
    delete store.banks[name]; delete store.progress[name]; delete store.wrong[name];
    saveStore(); renderBanks(); toast("已删除:"+name);
  } else if(name){ toast("没找到这个词库"); }
}

/* =========================================================
   事件绑定 & 启动
   ========================================================= */

$("importBackup").addEventListener("change",(e)=>{ if(e.target.files[0]) importBackup(e.target.files[0]); e.target.value=""; });
$("exportBackup").onclick=exportBackup;
$("hintToggle").onclick=()=>{
  store.hintOn=!store.hintOn;
  saveStore();
  updateHintToggle();
};
function updateHintToggle(){
  const b=$("hintToggle");
  b.textContent="💡 字母提示："+(store.hintOn?"开":"关");
  b.classList.toggle("green", store.hintOn);
  b.classList.toggle("gray", !store.hintOn);
}

$("practiceWrong").onclick=()=>{
  // 错题练习:在作用域错题里挑一个有题的模式开练
  const wrongItems=scopeWrongItems();
  if(wrongItems.length===0){ toast("错题本是空的,继续闯关收集错题吧 🙂"); return; }
  const modesToTry=["spell1","spell2","cloze","mean1","mean2"];
  for(const m of modesToTry){
    if(wrongItems.some(it=>isItemUsable(m,it))){ startGame(m,true); return; }
  }
  toast("错题本里没有适合的题型 🙂");
};
document.querySelectorAll("[data-go]").forEach(b=> b.onclick=()=>show(b.dataset.go));

function isItemUsable(mode,it){
  if(mode==="spell1"||mode==="spell2") return it.type==="word"||(it.type==="phrase"&&!it.word.includes(" "));
  if(mode==="mean1"||mode==="mean2") return (it.type==="word"||it.type==="phrase")&&it.meaning;
  if(mode==="cloze") return it.example && it.example.split(" ").length>=2;
  if(mode==="prep") return it.type==="prep" && !!it.prep;
  return true;
}

// 启动:未选身份 → 欢迎页;已选身份 → 直接进对应词库首页
// 启动:注入内嵌全部词库(幂等),再按身份状态决定进欢迎页还是首页
updateIceCreamDisplay();
EMBEDDED_BANKS.forEach(b=>{
  const id=bankId(b.meta);
  store.banks[id]={ meta:b.meta, items:b.items };
  if(!store.progress[id]) store.progress[id]={stars:0};
  if(!store.wrong[id]) store.wrong[id]=[];
});
saveStore();
if(store.identity){
  renderBanks();
} else {
  show("welcome");
}
bindWelcomeCards();

// 调试钩子(便于自动化测试查看内部状态;对正常使用无副作用)
window._wrt = { getGame:()=>game, getSpell:()=>spell, addBank, startGame, enterBank, enterTotal,
                store:()=>store, getScope:()=>scope };
</script>
